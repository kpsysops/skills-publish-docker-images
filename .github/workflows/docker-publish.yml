
name: Docker Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v6
      - name: Log in to the Container reqistry 
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build nad push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/kpsysops/skills-publish-docker-images/stackoverflown:main
            ghcr.io/kpsysops/skills-publish-docker-images/stackoverflown:${{ github.sha }}        






